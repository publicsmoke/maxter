<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' https://cdn.jsdelivr.net; img-src 'self' data:;">
  <title>NEXUS TERMINAL</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&family=Rajdhani:wght@400;500;600;700&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="stars"></div>

  <div class="app">
    <aside class="sidebar">
      <div class="logo">
        <div class="logo-mark">
          <span class="corner tl"></span>
          <span class="corner tr"></span>
          <span class="corner bl"></span>
          <span class="corner br"></span>
          <span class="lm-text">N</span>
        </div>
        <div class="logo-text">
          <div class="logo-title">NEXUS</div>
          <div class="logo-sub">TERMINAL / v0.1</div>
        </div>
      </div>

      <button class="btn btn-accent btn-block btn-add" id="btnAdd">
        <span class="plus">+</span> ADD ENDPOINT
      </button>

      <div class="srv-head">
        <span>FLEET REGISTRY</span>
        <span class="count" id="srvCount">00</span>
      </div>

      <div id="serverList" class="server-list"></div>

      <div class="status-block">
        <div class="status-row">
          <span>SYSTEM</span>
          <span class="val" id="sysLabel">NOMINAL</span>
        </div>
        <div class="status-bar"><div class="status-bar-fill" id="sysBar" style="width: 100%"></div></div>

        <div class="status-row mt theme-toggle" id="themeToggle" role="button" tabindex="0">
          <span>THEME</span>
          <span class="theme-end">
            <span class="val" id="themeLabel">OBSIDIAN</span>
            <span class="chev">▸</span>
          </span>
        </div>
        <div class="theme-dots" id="themeDots" hidden>
          <button class="theme-dot" data-theme="obsidian" style="--swatch: #6695c4" title="Obsidian"></button>
          <button class="theme-dot" data-theme="polar" style="--swatch: #0066cc" title="Polar"></button>
          <button class="theme-dot" data-theme="cybertron" style="--swatch: #ff2d95" title="Cybertron"></button>
          <button class="theme-dot" data-theme="mars" style="--swatch: #ff6a3d" title="Mars"></button>
          <button class="theme-dot" data-theme="matrix" style="--swatch: #00ff41" title="Matrix"></button>
          <button class="theme-dot" data-theme="nord" style="--swatch: #88c0d0" title="Nord"></button>
          <button class="theme-dot" data-theme="solar" style="--swatch: #268bd2" title="Solar"></button>
          <button class="theme-dot" data-theme="void" style="--swatch: #ffffff" title="Void"></button>
        </div>
      </div>
    </aside>

    <main class="main">
      <div class="tabs-bar" id="tabsBar">
        <div class="tab-placeholder">NO ACTIVE SESSIONS</div>
      </div>
      <div class="workspace" id="workspace">
        <div class="splash" id="splash">
          <div class="splash-mark">
            <span class="corner tl"></span>
            <span class="corner tr"></span>
            <span class="corner bl"></span>
            <span class="corner br"></span>
            <span class="sm-text">N</span>
          </div>
          <div class="splash-title">NEXUS TERMINAL</div>
          <div class="splash-sub">SSH / SFTP CONTROL // BUILD 0.1</div>
          <div class="splash-rule"></div>
          <div class="splash-msg">NO ACTIVE SESSIONS</div>
          <div class="splash-hint">SELECT AN ENDPOINT FROM THE FLEET REGISTRY · CMD+N ADD NEW · CMD+W DISCONNECT</div>

          <div class="splash-stats">
            <div class="stat">
              <span class="stat-n" id="statServers">0</span>
              <span class="stat-l">REGISTERED</span>
            </div>
            <div class="stat">
              <span class="stat-n" id="statActive">0</span>
              <span class="stat-l">ACTIVE</span>
            </div>
            <div class="stat">
              <span class="stat-n">OK</span>
              <span class="stat-l">SYSTEM</span>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal -->
  <div class="modal" id="modal" hidden>
    <div class="modal-body">
      <span class="corner tl"></span>
      <span class="corner tr"></span>
      <span class="corner bl"></span>
      <span class="corner br"></span>

      <div class="modal-header" id="modalTitle">DEPLOY NEW ENDPOINT</div>

      <div class="form">
        <label>CALLSIGN <input id="f-name" placeholder="Production API" autocomplete="off"></label>
        <div class="row">
          <label style="flex:2">HOST <input id="f-host" placeholder="server.example.com" autocomplete="off"></label>
          <label style="flex:1">PORT <input id="f-port" type="number" value="22" min="1" max="65535"></label>
        </div>
        <label>OPERATOR <input id="f-user" placeholder="root" autocomplete="off"></label>
        <div class="auth-toggle">
          <button class="seg active" data-auth="password">PASSWORD</button>
          <button class="seg" data-auth="key">KEY FILE</button>
        </div>
        <div id="auth-password">
          <label>ACCESS CODE <input id="f-pass" type="password" autocomplete="new-password"></label>
        </div>
        <div id="auth-key" hidden>
          <label>KEY PATH
            <div class="picker">
              <input id="f-key" placeholder="~/.ssh/id_rsa" readonly>
              <button id="btnPickKey" class="btn btn-ghost" type="button">BROWSE</button>
            </div>
          </label>
          <label>PASSPHRASE <input id="f-passphrase" type="password" autocomplete="new-password"></label>
        </div>
        <label>START PATH <input id="f-path" placeholder="/root" value="/root" autocomplete="off"></label>
      </div>
      <div class="modal-footer">
        <button id="btnDel" class="btn btn-danger" hidden>DECOMMISSION</button>
        <div style="flex:1"></div>
        <button id="btnCancel" class="btn btn-ghost">CANCEL</button>
        <button id="btnSave" class="btn btn-primary">CONFIRM</button>
      </div>
    </div>
  </div>

  <div class="toast-host" id="toastHost"></div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
